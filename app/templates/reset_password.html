<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password · Gatepass Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{teal:"#2b8a99",tealdark:"#1f6f7a",tealhover:"#247380",muted:"#6b7785"}}}};</script>
</head>
<body class="h-full text-slate-800 antialiased relative"><div class="fixed inset-0 z-0"><img src="/static/bg.jpg" alt="" class="w-full h-full object-cover"/><div class="absolute inset-0 bg-black/50 backdrop-blur-[2px]"></div></div>
  <main class="relative z-10 min-h-full grid place-items-center px-4 py-10">
    <div class="w-full max-w-sm">
      <div class="bg-white/95 backdrop-blur rounded-3xl p-8 shadow-[0_20px_60px_rgba(0,0,0,.3)]">
        <div class="text-center mb-6">
          <div class="h-12 w-12 mx-auto mb-3">
            <img src="/static/logo.png" alt="CPFI" class="h-full w-full object-contain"/>
          </div>
          <h1 class="text-lg font-bold text-tealdark">Reset Password</h1>
        </div>

        {% if valid %}
        <form method="post" action="/reset-password" class="space-y-4">
          <input type="hidden" name="token" value="{{ token }}"/>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">New Password</label>
            <input name="password" type="password" required minlength="6" placeholder="Minimum 6 characters"
              class="w-full border border-slate-300 rounded-xl px-3 py-2.5 text-sm focus:border-teal focus:ring-1 focus:ring-teal focus:outline-none"/>
          </div>
          <div id="error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>
          <button type="submit"
            class="w-full bg-teal hover:bg-tealhover text-white font-semibold rounded-xl py-3 text-sm transition">
            Reset Password
          </button>
        </form>
        {% else %}
        <div class="bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-sm text-red-600">
          This reset link is invalid or has expired. Please request a new one.
        </div>
        {% endif %}

        <div class="mt-4 text-center">
          <a href="/login" class="text-xs text-muted hover:text-slate-700">Back to Sign in</a>
        </div>
      </div>
    </div>
  </main>
  <script>
    const p = new URLSearchParams(location.search);
    if (p.get("error") === "expired") {
      const e = document.getElementById("error");
      if (e) { e.textContent = "This link has expired. Please request a new one."; e.classList.remove("hidden"); }
    }
    if (p.get("error") === "short") {
      const e = document.getElementById("error");
      if (e) { e.textContent = "Password must be at least 6 characters."; e.classList.remove("hidden"); }
    }
  </script>
</body>
</html>
