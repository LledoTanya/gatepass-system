<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <link rel="icon" type="image/png" href="/static/logo1.png">

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OIC Gatepass Request</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { teal:"#2b8a99", tealdark:"#1f6f7a", tealhover:"#247380",
                pendbg:"#f0dcb4", pendtx:"#8a6a35" },
      fontFamily: { mono:["ui-monospace","SFMono-Regular","Menlo","monospace"] },
    }}};
  </script>
</head>
<body class="h-full bg-slate-100 text-slate-900 antialiased">
<main class="min-h-full px-4 py-8 max-w-md mx-auto">

  <header class="flex items-center gap-2.5 mb-6">
    <div class="h-9 w-9"><img src="/static/logo.png" alt="CPFI" class="h-full w-full object-contain"/></div>
    <div>
      <h1 class="font-bold text-tealdark leading-tight">GateFlow/h1>
      <p class="text-xs text-slate-500">OIC Request</p>
    </div>
  </header>

  <!-- Form state -->
  <section id="form-section" class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm space-y-4">
    <div class="flex justify-between items-center text-xs text-slate-500">
      <span class="font-medium text-slate-700">{{ username }} &middot; OIC &middot; {{ dept_name }}</span>
      <span>Date: <span id="today"></span></span>
    </div>

    <div>
      <label class="block text-xs font-medium text-slate-500 mb-1">Purpose</label>
      <select id="purpose"
        class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:border-teal focus:outline-none">
        <option value="" disabled selected>Select purpose…</option>
        <option>Undertime</option>
        <option>Lunch Out</option>
        <option>Official Business</option>
        <option>Sickness / Illness</option>
        <option>Others</option>
      </select>
    </div>

    <div id="other-wrap" class="hidden">
      <label class="block text-xs font-medium text-slate-500 mb-1">Please specify</label>
      <input id="other_specify" type="text"
        class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:border-teal focus:outline-none"/>
    </div>

    <div id="sick-wrap" class="hidden border border-slate-200 rounded-lg p-3 space-y-3">
      <p class="text-xs font-medium text-slate-600">Due to sickness or illness</p>
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1">Medical diagnosis</label>
        <input id="diagnosis" type="text" placeholder="e.g. Fever, migraine"
          class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:border-teal focus:outline-none"/>
      </div>
      <p class="text-xs text-slate-500">The clinic nurse will set the recommendation.</p>
    </div>

    <div id="return-wrap">
      <label class="block text-xs font-medium text-slate-500 mb-1">Expected return time</label>
      <input id="return_time" type="time"
        class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:border-teal focus:outline-none"/>
    </div>

    <!-- Approver selection -->
    <div id="approver-section" class="hidden border border-slate-200 rounded-lg p-3 space-y-3">
      <p id="head-status-msg" class="text-xs text-slate-500"></p>

      <label id="delegate-toggle-row" class="hidden flex items-start gap-2 cursor-pointer">
        <input type="checkbox" id="delegate-toggle" class="mt-0.5 rounded border-slate-300 text-teal"/>
        <span class="text-xs text-slate-600">My department head is not available - select a department and approver</span>
      </label>

      <div id="delegate-wrap" class="hidden space-y-3">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">Department</label>
          <select id="approver-dept"
            class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:border-teal focus:outline-none">
            <option value="">Select department…</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">Approver</label>
          <select id="approver-user"
            class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:border-teal focus:outline-none">
            <option value="">Select a department first…</option>
          </select>
        </div>
      </div>
    </div>

    <p id="form-error" class="hidden text-sm text-red-600"></p>

    <button id="submit"
      class="w-full bg-teal hover:bg-tealhover text-white font-semibold rounded-lg py-2.5 text-sm transition">
      Submit request
    </button>
  </section>

  <!-- Confirm state -->
  <section id="confirm-section" class="hidden bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
    <div class="mb-4">
      <span id="status-badge" class="text-xs font-semibold uppercase px-2 py-1 rounded-full bg-pendbg text-pendtx">Pending</span>
    </div>
    <h2 id="status-title" class="font-semibold">Request submitted</h2>
    <p id="status-sub" class="mt-1 text-sm text-slate-500">Waiting for approval…</p>

    <dl class="mt-4 text-sm divide-y divide-slate-100 border-t border-slate-100">
      <div class="flex justify-between py-2"><dt class="text-slate-500">Name</dt><dd id="c-name" class="font-medium"></dd></div>
      <div class="flex justify-between py-2"><dt class="text-slate-500">Purpose</dt><dd id="c-purpose"></dd></div>
      <div class="flex justify-between py-2"><dt class="text-slate-500">Back by</dt><dd id="c-return" class="font-mono"></dd></div>
      <div class="flex justify-between py-2"><dt class="text-slate-500">Approver</dt><dd id="c-approver" class="font-medium"></dd></div>
    </dl>

    <div class="mt-4 space-y-2">
      <a id="slip" href="#" target="_blank" rel="noopener"
         class="block w-full border border-slate-300 hover:border-teal rounded-lg py-2 text-sm font-medium text-slate-700 text-center transition">
        View / print slip (PDF)
      </a>
      <button id="cancel-btn"
        class="block w-full border border-slate-300 hover:border-red-400 rounded-lg py-2 text-sm font-medium text-slate-600 hover:text-red-600 text-center transition">
        Cancel request
      </button>
    </div>
    <p id="confirm-error" class="hidden mt-2 text-sm text-red-600"></p>
  </section>

</main>
<script>
  const $ = id => document.getElementById(id);
  const MY_DEPT = {{ dept_name | tojson }};
  const MY_USER_ID = {{ user_id }};
  let allDepts = [];
  let currentGpId = null;

  async function init() {
    $("today").textContent = new Date().toLocaleDateString();
    const [dr, hdr] = await Promise.all([
      fetch("/api/departments"),
      fetch(`/api/dept-head-available?dept=${encodeURIComponent(MY_DEPT)}`),
    ]);
    allDepts = await dr.json();
    const { available, username: headName } = await hdr.json();

    // Populate dept dropdown for delegation (all depts, own first)
    const dsel = $("approver-dept");
    dsel.innerHTML = '<option value="">Select department…</option>';
    if (MY_DEPT) {
      const o = document.createElement("option");
      o.value = MY_DEPT; o.textContent = MY_DEPT + " (my department)";
      dsel.appendChild(o);
    }
    allDepts.filter(d => d !== MY_DEPT).forEach(d => {
      const o = document.createElement("option");
      o.value = d; o.textContent = d; dsel.appendChild(o);
    });

    // Show approver section
    $("approver-section").classList.remove("hidden");

    if (available) {
      $("head-status-msg").textContent = `Your request will be sent to your department head.`;
      $("delegate-toggle-row").classList.remove("hidden");
      $("delegate-toggle").checked = false;
      $("delegate-toggle").disabled = false;
    } else {
      $("head-status-msg").textContent = "Your department head is not available. Please select an approver.";
      $("delegate-toggle-row").classList.remove("hidden");
      $("delegate-toggle").checked = true;
      $("delegate-toggle").disabled = true;
      $("delegate-wrap").classList.remove("hidden");
    }
  }

  $("delegate-toggle").addEventListener("change", () => {
    $("delegate-wrap").classList.toggle("hidden", !$("delegate-toggle").checked);
    if (!$("delegate-toggle").checked) {
      $("approver-dept").value = "";
      $("approver-user").innerHTML = '<option value="">Select a department first…</option>';
    }
  });

  $("approver-dept").addEventListener("change", async () => {
    await loadApprovers($("approver-dept").value);
  });

  async function loadApprovers(dept) {
    if (!dept) { $("approver-user").innerHTML = '<option value="">Select a department first…</option>'; return; }
    $("approver-user").innerHTML = '<option value="">Loading…</option>';

    let approvers;
    if (dept === MY_DEPT) {
      // Own dept: OICs only (excluding self)
      const r = await fetch(`/api/oic-approvers?dept=${encodeURIComponent(dept)}&exclude_user_id=${MY_USER_ID}`);
      approvers = await r.json();
    } else {
      // Other dept: Head and OICs
      const r = await fetch(`/api/approvers-for-dept?dept=${encodeURIComponent(dept)}`);
      approvers = await r.json();
    }

    $("approver-user").innerHTML = '<option value="">Select approver…</option>';
    if (approvers.length === 0) {
      $("approver-user").innerHTML = `<option value="">No active ${dept === MY_DEPT ? "OICs" : "approvers"} in this department</option>`;
      return;
    }
    approvers.forEach(a => {
      const o = document.createElement("option");
      o.value = a.id;
      o.textContent = a.role === "dept_head" ? `${a.username} (Head)` : a.username;
      $("approver-user").appendChild(o);
    });
  }

  $("purpose").addEventListener("change", () => {
    const p = $("purpose").value;
    $("other-wrap").classList.toggle("hidden", p !== "Others");
    $("sick-wrap").classList.toggle("hidden", p !== "Sickness / Illness");
    const rt = $("return_time"), rw = $("return-wrap");
    if (p === "Lunch Out") { rt.value = "13:00"; rt.readOnly = true; rw.classList.remove("hidden"); }
    else if (p === "Undertime" || p === "Sickness / Illness") { rt.value = ""; rw.classList.add("hidden"); }
    else { rt.value = ""; rt.readOnly = false; rw.classList.remove("hidden"); }
  });

  $("submit").addEventListener("click", async () => {
    const purpose = $("purpose").value;
    const err = $("form-error");
    err.classList.add("hidden");
    if (!purpose) { err.textContent = "Please select a purpose."; err.classList.remove("hidden"); return; }
    const needsReturn = purpose === "Official Business" || purpose === "Others";
    const return_time = $("return_time").value || null;
    if (needsReturn && !return_time) { err.textContent = "Please choose an expected return time."; err.classList.remove("hidden"); return; }
    // Resolve approver: null = auto-assign head; set = chosen delegate
    const isDelegating = $("delegate-toggle").checked;
    let assigned_to_user_id = null;
    if (isDelegating) {
      if (!$("approver-user").value) {
        err.textContent = "Please select an approver."; err.classList.remove("hidden"); return;
      }
      assigned_to_user_id = parseInt($("approver-user").value);
    }

    let notes = null, diagnosis = null;
    if (purpose === "Others") {
      notes = $("other_specify").value.trim();
      if (!notes) { err.textContent = "Please specify the purpose."; err.classList.remove("hidden"); return; }
    } else if (purpose === "Sickness / Illness") {
      diagnosis = $("diagnosis").value.trim();
      if (!diagnosis) { err.textContent = "Please enter the medical diagnosis."; err.classList.remove("hidden"); return; }
    }

    $("submit").disabled = true; $("submit").textContent = "Submitting…";
    const r = await fetch("/api/oic-gatepass", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        purpose, return_time, notes, diagnosis,
        assigned_to_user_id,
      }),
    });
    $("submit").disabled = false; $("submit").textContent = "Submit request";
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      err.textContent = d.detail || "Could not submit. Please try again.";
      err.classList.remove("hidden"); return;
    }
    const gp = await r.json();
    currentGpId = gp.id;
    renderConfirm(gp);
    $("form-section").classList.add("hidden");
    $("confirm-section").classList.remove("hidden");
    watch(gp.id);
  });

  $("cancel-btn").addEventListener("click", async () => {
    if (!currentGpId) return;
    $("confirm-error").classList.add("hidden");
    $("cancel-btn").disabled = true; $("cancel-btn").textContent = "Cancelling…";
    const r = await fetch(`/api/gatepass/${currentGpId}/cancel`, { method: "POST" });
    $("cancel-btn").disabled = false; $("cancel-btn").textContent = "Cancel request";
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      $("confirm-error").textContent = d.detail || "Could not cancel.";
      $("confirm-error").classList.remove("hidden"); return;
    }
    const gp = await r.json();
    renderConfirm(gp);
  });

  function renderConfirm(g) {
    $("c-name").textContent = g.name;
    let p = g.purpose;
    if (g.purpose === "Others" && g.notes) p = `Others — ${g.notes}`;
    else if (g.purpose === "Sickness / Illness") p = `Sickness${g.recommendation ? " — " + g.recommendation : ""}`;
    $("c-purpose").textContent = p;
    $("c-return").textContent = g.return_time;
    $("c-approver").textContent = g.assigned_to_username || "—";
    $("slip").href = `/api/gatepass/${g.id}/pdf`;
    applyStatus(g.status);
  }

  const STATUS_LABELS = {
    pending:"Pending", pending_nurse:"Pending nurse review",
    approved:"Approved", denied:"Denied", completed:"Completed", cancelled:"Cancelled"
  };
  const STATUS_BADGE = {
    pending:"bg-pendbg text-pendtx", pending_nurse:"bg-purple-100 text-purple-700",
    approved:"bg-green-100 text-green-700", denied:"bg-red-100 text-red-700",
    completed:"bg-slate-200 text-slate-600", cancelled:"bg-slate-200 text-slate-600",
  };

  function applyStatus(status) {
    const badge = $("status-badge");
    badge.textContent = STATUS_LABELS[status] || status;
    badge.className = `text-xs font-semibold uppercase px-2 py-1 rounded-full ${STATUS_BADGE[status] || ""}`;
    const isActive = ["pending","pending_nurse","approved"].includes(status);
    $("cancel-btn").classList.toggle("hidden", !isActive || status === "approved");
    const titles = {
      pending:"Request submitted", pending_nurse:"Request submitted",
      approved:"Approved — you may proceed",
      denied:"Request denied", completed:"Request completed", cancelled:"Request cancelled",
    };
    const subs = {
      pending:"Waiting for approval…", pending_nurse:"The clinic nurse is reviewing your request.",
      approved:"Show this screen to the guard at the gate.",
      denied:"Please see your supervisor.", completed:"Your return has been logged.",
      cancelled:"Your request has been cancelled.",
    };
    $("status-title").textContent = titles[status] || status;
    $("status-sub").textContent = subs[status] || "";
  }

  function watch(id) {
    let last = null, done = false;
    const update = s => {
      if (s === last) return; last = s; applyStatus(s);
      if (["denied","completed","cancelled"].includes(s)) done = true;
    };
    try {
      const es = new EventSource("/api/events");
      es.addEventListener("status_update", e => {
        const g = JSON.parse(e.data);
        if (Number(g.id) === Number(id)) { update(g.status); if (done) es.close(); }
      });
    } catch(_) {}
    setInterval(async () => {
      if (done) return;
      try { const r = await fetch(`/api/gatepass/${id}`,{cache:"no-store"}); if(r.ok){const g=await r.json();update(g.status);} } catch(_) {}
    }, 5000);
  }

  init();
</script>
</body>
</html>
