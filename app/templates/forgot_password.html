<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <link rel="icon" type="image/png" href="/static/logo1.png">
  
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password · Gatepass Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{teal:"#2b8a99",tealdark:"#1f6f7a",tealhover:"#247380",muted:"#6b7785"}}}};</script>
</head>
<body class="h-full text-slate-800 antialiased relative"><div class="fixed inset-0 z-0"><img src="/static/bg.jpg" alt="" class="w-full h-full object-cover"/><div class="absolute inset-0 bg-black/50 backdrop-blur-[2px]"></div></div>
  <main class="relative z-10 min-h-full grid place-items-center px-4 py-10">
    <div class="w-full max-w-md">
      <div class="bg-white/95 backdrop-blur rounded-3xl p-8 shadow-[0_20px_60px_rgba(0,0,0,.3)]">

        <div class="text-center mb-6">
          <div class="h-12 w-12 mx-auto mb-3">
            <img src="/static/logo.png" alt="CPFI" class="h-full w-full object-contain"/>
          </div>
          <h1 class="text-lg font-bold text-tealdark">Forgot Password</h1>
          <p class="text-sm text-muted mt-1">Enter your username to recover your account.</p>
        </div>

        <!-- The form (hidden when showing a result) -->
        <form id="form" method="post" action="/forgot-password" class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">Username</label>
            <input name="username" required placeholder="Enter your username"
              class="w-full border border-slate-300 rounded-xl px-3 py-2.5 text-sm focus:border-teal focus:ring-1 focus:ring-teal focus:outline-none"/>
          </div>
          <button type="submit"
            class="w-full bg-teal hover:bg-tealhover text-white font-semibold rounded-xl py-3 text-sm transition">
            Submit
          </button>
        </form>

        <!-- Results (shown conditionally) -->
        <div id="result" class="hidden space-y-4">
          <div id="r-content"></div>
          <a href="/login" class="block text-center text-sm font-medium text-teal hover:text-tealhover">Back to Sign in</a>
        </div>
      </div>
    </div>
  </main>
  <script>
    const p = new URLSearchParams(location.search);
    const form = document.getElementById("form");
    const result = document.getElementById("result");
    const rc = document.getElementById("r-content");

    if (p.get("error") === "notfound") {
      rc.innerHTML = '<div class="bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-sm text-red-600">Username not found or account is inactive.</div>';
      form.classList.add("hidden"); result.classList.remove("hidden");
    }
    else if (p.get("reset_token")) {
      const token = p.get("reset_token");
      const email = p.get("email") || "";
      const link = location.origin + "/reset-password?token=" + token;
      rc.innerHTML = `
        <div class="bg-green-50 border border-green-200 rounded-lg px-4 py-3 text-sm text-green-700 space-y-2">
          <p class="font-semibold">Reset link generated</p>
          <p>In production this link would be emailed to <strong>${email}</strong>. For this demo, use it directly:</p>
          <a href="${link}" class="block break-all text-teal hover:text-tealhover font-mono text-xs underline">${link}</a>
          <p class="text-xs text-muted">This link expires in 1 hour.</p>
        </div>`;
      form.classList.add("hidden"); result.classList.remove("hidden");
    }
    // Legacy param — kept for any bookmarked links
    else if (p.get("admin_token")) {
      const token = p.get("admin_token");
      const email = p.get("email") || "";
      const link = location.origin + "/reset-password?token=" + token;
      rc.innerHTML = `
        <div class="bg-green-50 border border-green-200 rounded-lg px-4 py-3 text-sm text-green-700 space-y-2">
          <p class="font-semibold">Reset link generated</p>
          <p>In production this link would be emailed to <strong>${email}</strong>. For this demo, use it directly:</p>
          <a href="${link}" class="block break-all text-teal hover:text-tealhover font-mono text-xs underline">${link}</a>
          <p class="text-xs text-muted">This link expires in 1 hour.</p>
        </div>`;
      form.classList.add("hidden"); result.classList.remove("hidden");
    }
  </script>
</body>
</html>
