<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in · Gatepass Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{teal:"#2b8a99",tealdark:"#1f6f7a",tealhover:"#247380",muted:"#6b7785"}}}};</script>
</head>
<body class="h-full text-slate-800 antialiased relative">
  <!-- Background image with overlay -->
  <div class="fixed inset-0 z-0">
    <img src="/static/bg.jpg" alt="" class="w-full h-full object-cover"/>
    <div class="absolute inset-0 bg-black/50 backdrop-blur-[2px]"></div>
  </div>

  <main class="relative z-10 min-h-full grid place-items-center px-4 py-10">
    <div class="w-full max-w-sm">
      <form method="post" action="/login"
            class="bg-white/95 backdrop-blur rounded-3xl p-8 space-y-5 shadow-[0_20px_60px_rgba(0,0,0,.3)]">

        <div class="text-center">
          <div class="h-14 w-14 mx-auto mb-3">
            <img src="/static/logo.png" alt="CPFI" class="h-full w-full object-contain"/>
          </div>
          <h1 class="text-xl font-bold text-tealdark">Gatepass Control</h1>
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">Username or Email</label>
          <input name="username" autocomplete="username" placeholder="Enter username or email"
            class="w-full bg-white border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:border-teal focus:ring-1 focus:ring-teal focus:outline-none"/>
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">Password</label>
          <div class="relative">
            <input name="password" id="pwd" type="password" autocomplete="current-password" placeholder="Enter password"
              class="w-full bg-white border border-slate-300 rounded-xl px-4 pr-11 py-2.5 text-sm focus:border-teal focus:ring-1 focus:ring-teal focus:outline-none"/>
            <button type="button" id="eye"
              class="absolute right-3 top-1/2 -translate-y-1/2 p-0.5 text-slate-400 hover:text-teal transition-colors">
              <!-- eye open — shown when password is hidden -->
              <svg id="eye-show" width="18" height="18" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- eye off — shown when password is visible -->
              <svg id="eye-hide" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>
        <div id="success" class="hidden text-sm text-green-700 bg-green-50 border border-green-200 rounded-lg px-3 py-2"></div>

        <button type="submit"
          class="w-full bg-teal hover:bg-tealhover text-white font-semibold rounded-xl py-3 text-sm transition shadow-sm">
          Sign in
        </button>

        <div class="text-center">
          <a href="/forgot-password" class="text-xs font-medium text-teal hover:text-tealhover">Forgot Password?</a>
        </div>
      </form>
    </div>
  </main>
  <script>
    document.getElementById("eye").addEventListener("click",()=>{
      const p=document.getElementById("pwd");
      const show=p.type==="password";
      p.type=show?"text":"password";
      document.getElementById("eye-show").classList.toggle("hidden",show);
      document.getElementById("eye-hide").classList.toggle("hidden",!show);
    });
    const params=new URLSearchParams(location.search);
    if(params.get("error")){const e=document.getElementById("error");e.textContent="Invalid username or password.";e.classList.remove("hidden");}
    if(params.get("reset")){const s=document.getElementById("success");s.textContent="Password reset successfully. Please sign in.";s.classList.remove("hidden");}
  </script>
</body>
</html>
